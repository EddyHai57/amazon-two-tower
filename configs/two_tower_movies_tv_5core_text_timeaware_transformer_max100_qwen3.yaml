run_label: text_timeaware_transformer_max100_qwen3
data_dir: data/processed/movies_tv_5core
output_dir: outputs/text_timeaware_transformer_max100_qwen3
embedding_dim: 64
batch_size: 4096
learning_rate: 0.001
weight_decay: 0.000001
epochs: 20
temperature: 0.15
use_l2_norm: true
seed: 42
eval_k_list: [20, 50, 100]
eval_batch_size: 256
eval_max_users: 50000
num_workers: 0
device: cuda
save_best_by: valid_recall@50
history_max_len: 100
history_weight: 1.0
# ONLY change vs canonical final: text embedding source MiniLM(384) -> Qwen3(1024).
# text_proj auto-adapts to input dim (nn.Linear(text_emb.shape[1], 64)); no model change.
item_text_embedding_path: outputs/item_text_embeddings_qwen3/movies_tv_5core/item_text_embedding.npy
item_has_text_path: outputs/item_text_embeddings_qwen3/movies_tv_5core/item_has_text.npy
text_proj_dim: 64
use_has_text_mask: true
item_fusion: additive
pooling_type: transformer_timeaware
decay_rate: 0.8
num_layers: 1
num_heads: 4
ffn_dim: 256
dropout: 0.1
# Canonical stability settings (identical to MiniLM final, for fair comparison)
early_stopping_patience: 2
grad_clip_norm: 0.0
warmup_steps: 0
lr_schedule: none
