data_dir: data/processed/movies_tv_5core
output_dir: outputs/text_time_decay_mean_pool_smoke
embedding_dim: 64
batch_size: 4096
learning_rate: 0.001
weight_decay: 0.000001
epochs: 1
temperature: 0.15
use_l2_norm: true
seed: 42
eval_k_list: [20, 50, 100]
eval_batch_size: 256
eval_max_users: 50000
num_workers: 0
device: cuda
save_best_by: valid_recall@50
history_max_len: 20
history_weight: 1.0
item_text_embedding_path: outputs/item_text_embeddings/movies_tv_5core/item_text_embedding.npy
item_has_text_path: outputs/item_text_embeddings/movies_tv_5core/item_has_text.npy
text_proj_dim: 64
use_has_text_mask: true
item_fusion: additive
# Time-decay pooling: weight_k = decay_rate^(seq_len-1-k), newest item gets weight 1.0
pooling_type: time_decay
decay_rate: 0.8
